# Alembic config. Added pragmatically: during dev we drop/recreate tables via
# create_all on startup; migrations are not auto-run. Adopt migration discipline
# (alembic revision --autogenerate / alembic upgrade head) as we approach prod.
#
# The DB URL is NOT set here — env.py reads it from DATABASE_URL so the same
# generic Postgres config drives both the app and migrations.

[alembic]
script_location = alembic
prepend_sys_path = src
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
